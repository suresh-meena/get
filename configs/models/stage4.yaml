models:
  - name: PairwiseGET
    factory: pairwiseget
    enabled: true
    params:
      in_dim: ${in_dim}
      d: ${pairwise_hidden_dim}
      num_classes: ${num_classes}
      num_steps: ${num_steps}
      norm_style: ${get_norm_style}
      pairwise_et_mask: ${get_pairwise_et_mask}
      pe_k: ${get_pe_k}
      rwse_k: ${rwse_k}
      use_cls_token: false

  - name: FullGET
    factory: fullget
    enabled: true
    params:
      in_dim: ${in_dim}
      d: ${hidden_dim}
      num_classes: ${num_classes}
      num_steps: ${num_steps}
      lambda_3: ${lambda_3}
      norm_style: ${get_norm_style}
      pairwise_et_mask: ${get_pairwise_et_mask}
      pe_k: ${get_pe_k}
      rwse_k: ${rwse_k}
      use_cls_token: false

  - name: ETFaithful
    factory: etfaithful
    enabled: true
    params:
      in_dim: ${in_dim}
      d: ${hidden_dim}
      num_classes: ${num_classes}
      num_steps: ${num_steps}
      num_blocks: ${et_num_blocks}
      num_heads: ${et_num_heads}
      head_dim: ${et_head_dim_or_none}
      pe_k: ${et_pe_k}
      rwse_k: ${rwse_k}
      mask_mode: ${et_mask_mode}
      et_official_mode: ${et_official_mode}
      node_cap: ${et_node_cap}
